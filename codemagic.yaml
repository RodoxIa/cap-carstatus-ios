# ============================================================================
# codemagic.yaml — CarStatus (wrapper Capacitor iOS)
# Build + assinatura + envio pro TestFlight/App Store via Codemagic (Mac na nuvem).
# Mesmo padrao do MeGuia (cap-meguia-ios). Free tier: mac_mini_m2, 500 min/mes.
# ----------------------------------------------------------------------------
#
# >>> PRE-REQUISITO QUE BLOQUEIA O UPLOAD <<<
#   O app PRECISA existir no App Store Connect (ter um Apple ID numerico) ANTES
#   de o build conseguir SUBIR (TestFlight/loja). Criar o app no ASC:
#       Plataforma iOS | Nome: CarStatus | Bundle ID: br.com.futurizeia.carstatus
#       SKU: carstatus-ios-001 | Idioma primario: PT-BR
#   (O Bundle ID ja esta registrado em Certificates, IDs & Profiles > Identifiers.)
#   Depois de criado, anotar o APPLE ID numerico e preencher APP_STORE_APPLE_ID abaixo.
#
# >>> ASSINATURA: AUTOMATIC via integracao App Store Connect <<<
#   Reusa a MESMA integracao do MeGuia ("meguia_asc": API Key .p8, Key ID Z4XV6T6BN6,
#   Issuer aed0a88a-...). Mesmo Team (9R57QQ98N6). Com `xcode-project fetch-signing-files`
#   + `--create`, a Codemagic gera/baixa o CERT de distribuicao e o PROVISIONING PROFILE
#   App Store especificos de br.com.futurizeia.carstatus automaticamente, usando a API Key.
#   NAO precisa gerar/subir .p12 nem .mobileprovision por app. ZERO segredo no repo.
#
#   (Se a integracao no Codemagic tiver outro nome, trocar `meguia_asc` abaixo.)
#
# >>> EVITAR FALHA DE UPLOAD ANTES DO APP EXISTIR <<<
#   A publicacao (publishing.app_store_connect) so dispara quando o build roda
#   na branch `main`. Enquanto o app nao existir no ASC, rode o build em uma
#   branch de teste (ex: `test-build`) -> ele COMPILA o .ipa mas NAO tenta subir.
# ============================================================================

workflows:
  ios-testflight:
    name: CarStatus iOS - TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Integracao "App Store Connect" (API Key .p8) criada na UI do Codemagic.
      # Reusa a do MeGuia (mesmo Team). Trocar o nome aqui se for diferente.
      app_store_connect: meguia_asc

    environment:
      vars:
        BUNDLE_ID: "br.com.futurizeia.carstatus"
        APP_STORE_APPLE_ID: 6785676649   # CarStatus Futurize (App Store Connect)
        APPLE_TEAM_ID: "9R57QQ98N6"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default

    triggering:
      # Publica (sobe pro TestFlight) apenas builds da branch main.
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Instalar dependencias do wrapper (npm)
        script: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Capacitor sync iOS
        script: |
          npx cap sync ios

      - name: Assinatura automatica (cert + profile App Store via ASC API Key)
        script: |
          set -e
          keychain initialize
          # Gera uma private key local (RSA 2048). Necessaria porque o
          # fetch-signing-files de um cert de distribuicao EXISTENTE so traz a
          # parte publica (.cer) — sem private key, "Cannot save Signing
          # Certificates without certificate private key". Passando a key abaixo,
          # a CLI cria um certificado NOVO ja casado com ela (ou monta o .p12).
          PK="$CM_BUILD_DIR/cert_key.pem"
          openssl genrsa -out "$PK" 2048
          # Baixa/cria o certificado de distribuicao + provisioning profile App
          # Store para o BUNDLE_ID, usando a API Key da integracao app_store_connect.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:"$PK" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      app_store_connect:
        # Usa a integracao app_store_connect declarada acima.
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false  # so TestFlight por enquanto
